<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minesweeper Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game-container">

    <h1>Minesweeper Pro 💣</h1>

    <div class="difficulty-bar">
        <button class="difficulty-btn active" data-level="easy">Easy</button>
        <button class="difficulty-btn" data-level="medium">Medium</button>
        <button class="difficulty-btn" data-level="hard">Hard</button>
    </div>

    <div class="controls-info">
    <div><strong>Laptop:</strong> Left-click to reveal · Right-click to flag</div>
    <div><strong>Phone:</strong> Single tap to reveal · Long-press to flag</div>
    </div>

    <div class="stats">
        <div>💣 <span id="mine-count"></span></div>
        <div>⏱ <span id="timer">00:00</span></div>
    </div>

    <div id="board"></div>

    <button id="restart" class="restart-btn">Restart</button>

</div>

<script src="script.js"></script>
</body>
</html>
